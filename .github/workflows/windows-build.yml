name: build-windows

on:
  push:
    branches: [ "main", "devin/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [ win-x64, win-x86 ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Xrav.sln

      - name: Build
        run: dotnet build Xrav.sln -c Release --no-restore

      - name: Publish single-file self-contained (${{ matrix.rid }})
        run: |
          dotnet publish src/Xrav.Desktop/Xrav.Desktop.csproj `
            -c Release -r ${{ matrix.rid }} --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None /p:DebugSymbols=false `
            -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: X-Rav-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/X-Rav.exe
          if-no-files-found: error
